name: Helm cron CD (Civo + OCI)

# Same as helm-cd.yml, plus schedule override for cronjob charts.
#
# Usage:
#   jobs:
#     deploy:
#       uses: ohdat/actions/.github/workflows/helm-cron-cd.yml@master
#       with:
#         environment: produce
#         namespace: backend
#         helm: renew-creator cronjob
#         set: "image.repository=ghcr.io/ohdat/creator:v0.1.9-dev,resources=null"
#         schedule: "0 0 * * *"
#         chart-version: "1.1.0"
#       secrets:
#         CIVO_TOKEN: ${{ secrets.CIVO_TOKEN }}
on:
  workflow_call:
    inputs:
      helm:
        description: "Release and chart, e.g. 'renew-creator cronjob'"
        required: true
        type: string
      set:
        required: true
        type: string
      namespace:
        required: true
        type: string
      environment:
        required: true
        type: string
      cluster:
        type: string
        required: false
        default: "ele-prod"
      region:
        type: string
        required: false
        default: "nyc1"
      # Deprecated EKS name — ignored
      kubename:
        type: string
        required: false
        default: ""
      helm-repo:
        required: false
        type: string
        default: "oci://ghcr.io/ohdat/charts"
      chart-version:
        required: false
        type: string
        default: ""
      schedule:
        type: string
        required: false
        default: "0 0 * * *"
    secrets:
      CIVO_TOKEN:
        required: true
      GIT_TOKEN:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Civo CLI
        run: |
          set -euo pipefail
          curl -sL https://civo.com/get | sh
          if ! command -v civo >/dev/null 2>&1; then
            sudo install -m 755 ./civo /usr/local/bin/civo
          fi
          civo version

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (Civo)
        env:
          CIVO_TOKEN: ${{ secrets.CIVO_TOKEN }}
          CIVO_CLUSTER: ${{ inputs.cluster }}
          CIVO_REGION: ${{ inputs.region }}
        run: |
          set -euo pipefail
          if [ -z "${CIVO_TOKEN}" ]; then
            echo "::error::CIVO_TOKEN secret is empty."
            exit 1
          fi
          if [ -n "${{ inputs.kubename }}" ] && [ "${{ inputs.kubename }}" != "${CIVO_CLUSTER}" ]; then
            echo "::warning::inputs.kubename is deprecated (AWS EKS). Using Civo cluster=${CIVO_CLUSTER}."
          fi
          mkdir -p "${HOME}/.kube"
          civo kubernetes config "${CIVO_CLUSTER}" \
            --region "${CIVO_REGION}" \
            --save \
            --overwrite \
            --local-path "${HOME}/.kube/config" \
            --yes
          kubectl config current-context
          kubectl get nodes -o wide

      - name: Ensure namespace
        run: |
          kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve chart and deploy
        env:
          HELM_REPO: ${{ inputs.helm-repo }}
          HELM_INPUT: ${{ inputs.helm }}
          HELM_SET: ${{ inputs.set }}
          NAMESPACE: ${{ inputs.namespace }}
          CHART_VERSION: ${{ inputs.chart-version }}
          SCHEDULE: ${{ inputs.schedule }}
          GH_TOKEN: ${{ secrets.GIT_TOKEN || github.token }}
          CIVO_CLUSTER: ${{ inputs.cluster }}
        run: |
          set -euo pipefail

          RELEASE="$(echo "${HELM_INPUT}" | awk '{print $1}')"
          CHART_REF="$(echo "${HELM_INPUT}" | awk '{print $2}')"
          if [ -z "${RELEASE}" ] || [ -z "${CHART_REF}" ]; then
            echo "::error::inputs.helm must be '<release> <chart>', got: ${HELM_INPUT}"
            exit 1
          fi

          VER_ARGS=()
          if [ -n "${CHART_VERSION}" ]; then
            VER_ARGS=(--version "${CHART_VERSION}")
          fi

          if [[ "${HELM_REPO}" == oci://* ]] || [[ "${CHART_REF}" == oci://* ]]; then
            if [[ "${CHART_REF}" == oci://* ]]; then
              CHART="${CHART_REF}"
            else
              CHART_NAME="${CHART_REF#ohdat/}"
              CHART="${HELM_REPO%/}/${CHART_NAME}"
            fi

            echo "OCI cron deploy: release=${RELEASE} chart=${CHART} version=${CHART_VERSION:-latest} schedule=${SCHEDULE} ns=${NAMESPACE}"
            echo "${GH_TOKEN}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

            helm upgrade --install "${RELEASE}" "${CHART}" \
              "${VER_ARGS[@]}" \
              -n "${NAMESPACE}" \
              --create-namespace \
              --wait \
              --timeout 10m \
              --history-max 5 \
              --set "${HELM_SET}" \
              --set "schedule=${SCHEDULE}"
          else
            echo "::warning::Using legacy helm-repo=${HELM_REPO}. Prefer oci://ghcr.io/ohdat/charts."
            helm repo add ohdat "${HELM_REPO}"
            helm repo update
            helm upgrade --install ${HELM_INPUT} \
              -n "${NAMESPACE}" \
              --create-namespace \
              --wait \
              --timeout 10m \
              --history-max 5 \
              --set "${HELM_SET}" \
              --set "schedule=${SCHEDULE}"
          fi

      - name: Status
        if: always()
        env:
          NAMESPACE: ${{ inputs.namespace }}
          HELM_INPUT: ${{ inputs.helm }}
          CIVO_CLUSTER: ${{ inputs.cluster }}
          SCHEDULE: ${{ inputs.schedule }}
        run: |
          RELEASE="$(echo "${HELM_INPUT}" | awk '{print $1}')"
          {
            echo "## Civo Helm cron deploy"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Cluster | \`${CIVO_CLUSTER}\` |"
            echo "| Namespace | \`${NAMESPACE}\` |"
            echo "| Release | \`${RELEASE}\` |"
            echo "| Schedule | \`${SCHEDULE}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          kubectl -n "$NAMESPACE" get cronjob,po 2>/dev/null || true
          helm -n "$NAMESPACE" status "$RELEASE" 2>/dev/null || true
