name: Node build && Docker Build and Push (GHCR)

# Optional npm build, then multi-arch image → ghcr.io/<owner>/<repo>
#
# Usage:
#   jobs:
#     build:
#       uses: ohdat/actions/.github/workflows/node-ci.yml@master
#       with:
#         VERSION: v0.1.${{ github.run_number }}
#         NODE_VERSION: "20"
#         BUILD_COMMANDS: "npm ci && npm run build"
#       secrets:
#         GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
on:
  workflow_call:
    inputs:
      VERSION:
        type: string
        default: v0.1.${{ github.run_number }}
      NODE_VERSION:
        default: "20"
        type: string
      BUILD_COMMANDS:
        default: "npm ci && npm run build"
        type: string
      IMAGE_NAME:
        type: string
        required: false
        default: ""
      # Deprecated compatibility knobs (ignored)
      DOCKERHUB_USERNAME:
        type: string
        required: false
        default: ""
    secrets:
      GIT_TOKEN:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      image:
        description: "Full image ref including tag"
        value: ${{ jobs.build.outputs.image }}
      version:
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name and tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ inputs.VERSION }}"
          if [ -n "${{ inputs.IMAGE_NAME }}" ]; then
            IMAGE="${{ inputs.IMAGE_NAME }}"
          else
            IMAGE="ghcr.io/${{ github.repository }}"
          fi
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAGS="${IMAGE}:${VERSION}"
          if [[ "${VERSION}" != *"-dev"* ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          else
            TAGS="${TAGS},${IMAGE}:dev"
          fi
          {
            echo "image=${IMAGE}:${VERSION}"
            echo "version=${VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${VERSION}"

      - name: Use Node.js ${{ inputs.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.NODE_VERSION }}

      - name: Private npm registry (GitHub Packages)
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GIT_TOKEN || github.token }}" > ~/.npmrc
          echo "@ohdat:registry=https://npm.pkg.github.com" >> ~/.npmrc

      - name: Run build
        run: ${{ inputs.BUILD_COMMANDS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_TOKEN=${{ secrets.GIT_TOKEN || github.token }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          {
            echo "## Node + Docker image (GHCR)"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.meta.outputs.image }}\` |"
            echo "| Version | \`${{ steps.meta.outputs.version }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
