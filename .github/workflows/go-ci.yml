name: Go build && Docker Build and Push (GHCR)

# GoReleaser snapshot + multi-arch image → ghcr.io/<owner>/<repo>
#
# Usage:
#   jobs:
#     ci:
#       uses: ohdat/actions/.github/workflows/go-ci.yml@master
#       with:
#         VERSION: v0.1.${{ github.run_number }}${{ github.ref != 'refs/heads/master' && '-dev' || '' }}
#       secrets:
#         GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
on:
  workflow_call:
    inputs:
      VERSION:
        type: string
        default: v0.1.${{ github.run_number }}
      IMAGE_NAME:
        type: string
        required: false
        default: ""
      # Deprecated compatibility knobs (ignored)
      DOCKERHUB_USERNAME:
        type: string
        required: false
        default: ""
      DOCKERHUB_REPO:
        type: string
        required: false
        default: ""
    secrets:
      GIT_TOKEN:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      image:
        description: "Full image ref including tag"
        value: ${{ jobs.build.outputs.image }}
      version:
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name and tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ inputs.VERSION }}"
          if [ -n "${{ inputs.IMAGE_NAME }}" ]; then
            IMAGE="${{ inputs.IMAGE_NAME }}"
          else
            IMAGE="ghcr.io/${{ github.repository }}"
          fi
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAGS="${IMAGE}:${VERSION}"
          if [[ "${VERSION}" != *"-dev"* ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          else
            TAGS="${TAGS},${IMAGE}:dev"
          fi
          {
            echo "image=${IMAGE}:${VERSION}"
            echo "version=${VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${VERSION}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure private Go modules
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN || github.token }}
        run: |
          set -euo pipefail
          go env -w GOPRIVATE=github.com/ohdat
          git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v1"
          args: release --clean --snapshot

      # goreleaser appends architecture variant suffixes; Dockerfiles often expect plain names
      - name: Normalize goreleaser dist paths
        run: |
          set -euo pipefail
          if [ -d dist/gomain_linux_amd64_v1 ]; then
            mv dist/gomain_linux_amd64_v1 dist/gomain_linux_amd64
          fi
          if [ -d dist/gomain_linux_arm64_v8.0 ]; then
            mv dist/gomain_linux_arm64_v8.0 dist/gomain_linux_arm64
          fi
          ls -al dist || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          {
            echo "## Go + Docker image (GHCR)"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.meta.outputs.image }}\` |"
            echo "| Version | \`${{ steps.meta.outputs.version }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
